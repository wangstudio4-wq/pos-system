<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KasirPro - Sistem POS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --primary: #4f46e5;
  --primary-dark: #4338ca;
  --primary-light: #e0e7ff;
  --sidebar-bg: #0f172a;
  --sidebar-hover: rgba(255,255,255,0.06);
  --sidebar-active: rgba(79,70,229,0.25);
  --bg: #f1f5f9;
  --white: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --success-bg: #d1fae5;
  --error: #ef4444;
  --error-bg: #fee2e2;
  --warning: #f59e0b;
  --warning-bg: #fef3c7;
  --info: #3b82f6;
  --info-bg: #dbeafe;
  --shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,.1), 0 4px 10px -5px rgba(0,0,0,.05);
  --shadow-xl: 0 20px 40px -10px rgba(0,0,0,.15);
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition: all 0.25s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }
table { border-collapse: collapse; width: 100%; }
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: #f8fafc; font-weight: 600; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .6px; }
tbody tr { transition: var(--transition); }
tbody tr:hover { background: #f8fafc; }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* ====== LOGIN PAGE ====== */
#loginPage {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 30%, #312e81 60%, #4f46e5 100%);
}
#loginPage::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(99,102,241,.15) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(139,92,246,.1) 0%, transparent 40%);
  animation: loginBgPulse 8s ease-in-out infinite alternate;
}
@keyframes loginBgPulse {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.1) rotate(3deg); }
}
.login-card {
  background: rgba(255,255,255,.95); backdrop-filter: blur(20px);
  border-radius: var(--radius-xl); padding: 48px 40px;
  width: 420px; max-width: 92vw;
  box-shadow: 0 25px 60px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.1);
  position: relative; z-index: 1;
  animation: loginCardIn .6s cubic-bezier(.16,1,.3,1);
}
@keyframes loginCardIn {
  from { opacity: 0; transform: translateY(30px) scale(.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.login-card h1 {
  text-align: center; font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 4px;
}
.login-card .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 32px; font-size: 14px; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px 14px; border: 2px solid var(--border);
  border-radius: var(--radius); font-size: 14px; outline: none;
  transition: var(--transition); background: #f8fafc;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79,70,229,.1);
  background: var(--white);
}

/* ====== BUTTONS ====== */
.btn {
  padding: 10px 20px; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; transition: var(--transition);
  display: inline-flex; align-items: center; gap: 6px; justify-content: center;
  position: relative; overflow: hidden;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.25); }
.btn-primary:hover { box-shadow: 0 4px 15px rgba(79,70,229,.35); transform: translateY(-1px); }
.btn-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,.25); }
.btn-success:hover { box-shadow: 0 4px 15px rgba(16,185,129,.35); transform: translateY(-1px); }
.btn-danger { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; box-shadow: 0 2px 8px rgba(239,68,68,.25); }
.btn-danger:hover { box-shadow: 0 4px 15px rgba(239,68,68,.35); transform: translateY(-1px); }
.btn-warning { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; box-shadow: 0 2px 8px rgba(245,158,11,.25); }
.btn-warning:hover { box-shadow: 0 4px 15px rgba(245,158,11,.35); transform: translateY(-1px); }
.btn-secondary { background: var(--white); color: var(--text); border: 2px solid var(--border); }
.btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-lg { padding: 14px 28px; font-size: 16px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ====== LAYOUT ====== */
#appContainer { display: none; }
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0; display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  border-right: 1px solid rgba(255,255,255,.05);
}
.sidebar-header {
  padding: 24px; border-bottom: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
}
.sidebar-header h2 {
  color: #fff; font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, #a5b4fc, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.sidebar-header small { color: #64748b; font-size: 12px; }
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; padding: 11px 16px; gap: 12px;
  color: #94a3b8; font-size: 14px; font-weight: 500;
  transition: var(--transition); cursor: pointer;
  border-radius: var(--radius); margin-bottom: 2px;
}
.nav-item:hover { background: var(--sidebar-hover); color: #e2e8f0; }
.nav-item.active {
  background: var(--sidebar-active); color: #fff;
  box-shadow: inset 3px 0 0 #818cf8;
}
.nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-footer {
  padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08);
  background: rgba(0,0,0,.15);
}
.user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.user-avatar {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 15px;
  box-shadow: 0 2px 8px rgba(79,70,229,.3);
}
.user-name { font-size: 14px; color: #f1f5f9; font-weight: 600; }
.user-role { font-size: 11px; }
.role-badge {
  padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
}
.role-owner { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #78350f; }
.role-admin { background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: #fff; }
.role-kasir { background: linear-gradient(135deg, #22d3ee, #06b6d4); color: #164e63; }
.btn-logout {
  width: 100%; padding: 10px; background: rgba(255,255,255,.06); color: #94a3b8;
  border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition);
}
.btn-logout:hover { background: rgba(255,255,255,.1); color: #fff; }

.main-content {
  flex: 1; margin-left: 260px; padding: 28px;
  min-height: 100vh; animation: fadeInPage .4s ease;
}
@keyframes fadeInPage { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.page-header p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

/* ====== CARDS ====== */
.card {
  background: var(--white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow); padding: 24px;
  border: 1px solid rgba(0,0,0,.04);
  transition: var(--transition);
}
.card:hover { box-shadow: var(--shadow-md); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-header h3 { font-size: 16px; font-weight: 700; }

/* ====== STAT CARDS ====== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  border-radius: var(--radius-lg); padding: 22px;
  box-shadow: var(--shadow-md); border: none;
  transition: var(--transition); position: relative; overflow: hidden;
}
.stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.stat-card::after {
  content: ''; position: absolute; top: -30%; right: -20%; width: 100px; height: 100px;
  border-radius: 50%; background: rgba(255,255,255,.1);
}
.stat-card .stat-icon { font-size: 28px; margin-bottom: 10px; position: relative; z-index: 1; }
.stat-card .stat-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; position: relative; z-index: 1; }
.stat-card .stat-label { font-size: 13px; opacity: .8; position: relative; z-index: 1; }
.stat-green { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }
.stat-blue { background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff; }
.stat-red { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
.stat-purple { background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: #fff; }

/* Dashboard grid */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

/* Chart */
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding: 10px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar-col .bar {
  width: 100%; min-height: 4px;
  background: linear-gradient(180deg, #4f46e5, #818cf8);
  border-radius: 6px 6px 0 0; transition: height .6s cubic-bezier(.4,0,.2,1);
}
.bar-col .bar-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
.bar-col .bar-value { font-size: 10px; color: var(--text-secondary); font-weight: 600; }

/* Badge */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-green { background: var(--success-bg); color: #065f46; }
.badge-red { background: var(--error-bg); color: #991b1b; }
.badge-blue { background: var(--info-bg); color: #1e40af; }
.badge-purple { background: #ede9fe; color: #5b21b6; }
.badge-orange { background: #ffedd5; color: #9a3412; }
.badge-yellow { background: var(--warning-bg); color: #92400e; }
.badge-gray { background: #f1f5f9; color: #475569; }
.category-badge { padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #fff; }

/* ====== POS LAYOUT ====== */
.pos-layout { display: flex; gap: 20px; height: calc(100vh - 100px); }
.pos-products { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.pos-cart {
  width: 380px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); overflow: hidden;
  border: 1px solid rgba(0,0,0,.04);
}
.pos-search { display: flex; gap: 8px; margin-bottom: 14px; }
.pos-search input {
  flex: 1; padding: 12px 16px; border: 2px solid var(--border);
  border-radius: var(--radius-lg); font-size: 14px;
  background: var(--white); transition: var(--transition);
}
.pos-search input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79,70,229,.08); }
.category-pills { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; flex-shrink: 0; }
.category-pill {
  padding: 8px 18px; border-radius: 50px; border: 2px solid var(--border);
  background: var(--white); font-size: 13px; font-weight: 600; white-space: nowrap;
  cursor: pointer; transition: var(--transition);
}
.category-pill:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.category-pill.active {
  background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff;
  border-color: transparent; box-shadow: 0 2px 8px rgba(79,70,229,.3);
}
.product-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 12px; overflow-y: auto; flex: 1; padding-right: 4px;
}
.product-card {
  background: var(--white); border-radius: var(--radius-lg);
  border: 2px solid var(--border); padding: 16px;
  cursor: pointer; transition: var(--transition);
  display: flex; flex-direction: column;
}
.product-card:hover {
  border-color: var(--primary); box-shadow: var(--shadow-md);
  transform: translateY(-3px);
}
.product-card .p-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; word-break: break-word; line-height: 1.3; }
.product-card .p-price {
  color: var(--primary); font-weight: 800; font-size: 16px; margin-bottom: 8px;
}
.product-card .p-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.product-card .p-stock { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.product-card.out-of-stock { opacity: .4; pointer-events: none; }

/* ====== CART ====== */
.cart-header {
  padding: 18px 20px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
}
.cart-header h3 { font-size: 16px; font-weight: 700; }
.cart-customer { padding: 10px 16px; border-bottom: 1px solid var(--border); background: #fafbfc; }
.cart-customer select { width: 100%; padding: 8px 10px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 13px; }
.cart-items { flex: 1; overflow-y: auto; padding: 8px 16px; }
.cart-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid #f1f5f9; font-size: 13px;
  transition: var(--transition);
}
.cart-item:hover { background: #fafbfc; margin: 0 -8px; padding: 10px 8px; border-radius: var(--radius); }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-price { color: var(--text-secondary); font-size: 12px; }
.cart-item-disc { margin-top: 2px; }
.cart-item-disc input { width: 70px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
.qty-control { display: flex; align-items: center; gap: 0; }
.qty-control button {
  width: 28px; height: 28px; border: 2px solid var(--border); background: var(--white);
  font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition); color: var(--text);
}
.qty-control button:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.qty-control button:first-child { border-radius: 8px 0 0 8px; }
.qty-control button:last-child { border-radius: 0 8px 8px 0; }
.qty-control span {
  width: 32px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-top: 2px solid var(--border); border-bottom: 2px solid var(--border);
  font-weight: 700; font-size: 13px; background: #fff;
}
.cart-item-total { font-weight: 700; white-space: nowrap; min-width: 70px; text-align: right; color: var(--primary); }
.cart-item .remove-btn { background: none; border: none; color: var(--error); font-size: 16px; cursor: pointer; padding: 2px; transition: var(--transition); }
.cart-item .remove-btn:hover { transform: scale(1.2); }
.cart-empty { text-align: center; padding: 40px 16px; color: var(--text-secondary); }
.cart-empty .empty-icon { font-size: 48px; margin-bottom: 8px; opacity: .5; }

.cart-summary { padding: 18px; border-top: 2px solid var(--border); background: #f8fafc; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.summary-row.total {
  font-size: 20px; font-weight: 800; color: var(--primary);
  margin: 12px 0; padding-top: 12px; border-top: 2px solid var(--border);
}
.discount-input { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.discount-input label { font-size: 13px; font-weight: 500; white-space: nowrap; }
.discount-input input { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; }
.payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.pay-method-btn {
  padding: 10px; border: 2px solid var(--border); border-radius: var(--radius);
  background: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
  transition: var(--transition); text-align: center;
}
.pay-method-btn:hover { border-color: var(--primary); background: #fafafe; }
.pay-method-btn.active {
  border-color: var(--primary); background: var(--primary-light); color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
.payment-input { margin-bottom: 8px; }
.payment-input input {
  width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius);
  font-size: 18px; font-weight: 700; text-align: right; transition: var(--transition);
}
.payment-input input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79,70,229,.08); }
.change-display { text-align: right; font-size: 14px; margin-bottom: 8px; }
.change-display span { font-weight: 700; color: var(--success); font-size: 16px; }
.cart-notes { margin-bottom: 8px; }
.cart-notes textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; resize: none; height: 40px; }
.btn-pay {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #059669, #10b981);
  color: #fff; border: none; border-radius: var(--radius-lg);
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 15px rgba(16,185,129,.3);
}
.btn-pay:hover { box-shadow: 0 6px 20px rgba(16,185,129,.4); transform: translateY(-2px); }
.btn-pay:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }

/* ====== MODAL ====== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,23,42,.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
  animation: modalOverlayIn .2s ease;
}
@keyframes modalOverlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--white); border-radius: var(--radius-xl); width: 500px;
  max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-xl);
  animation: modalSlideIn .3s cubic-bezier(.16,1,.3,1);
}
@keyframes modalSlideIn { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-lg { width: 700px; }
.modal-header { padding: 22px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 18px; font-weight: 700; }
.modal-close {
  background: #f1f5f9; border: none; font-size: 18px; color: var(--text-secondary);
  cursor: pointer; padding: 6px 10px; line-height: 1; border-radius: var(--radius);
  transition: var(--transition);
}
.modal-close:hover { background: #e2e8f0; color: var(--text); }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ====== TOAST ====== */
.toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast {
  padding: 14px 22px; border-radius: var(--radius-lg); color: #fff;
  font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg);
  animation: toastIn .4s cubic-bezier(.16,1,.3,1);
  min-width: 280px; display: flex; align-items: center; gap: 10px;
  backdrop-filter: blur(10px);
}
.toast-success { background: linear-gradient(135deg, #059669, #10b981); }
.toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); }
.toast-warning { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; }
.toast-info { background: linear-gradient(135deg, #2563eb, #3b82f6); }
@keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

/* Receipt */
.receipt { font-family: 'Courier New', monospace; font-size: 13px; max-width: 300px; margin: 0 auto; }
.receipt-header { text-align: center; margin-bottom: 10px; }
.receipt-header h3 { font-size: 16px; }
.receipt-divider { border-top: 1px dashed #333; margin: 6px 0; }
.receipt-row { display: flex; justify-content: space-between; font-size: 12px; }
.receipt-item { margin-bottom: 4px; }
.receipt-item .item-name { font-size: 12px; }
.receipt-item .item-detail { font-size: 11px; color: #555; display: flex; justify-content: space-between; }
.receipt-total { font-weight: 700; font-size: 14px; }
.receipt-footer { text-align: center; margin-top: 10px; font-size: 11px; color: #666; }

/* Toolbar */
.toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.toolbar .search-input {
  padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius);
  font-size: 14px; min-width: 200px; transition: var(--transition); background: var(--white);
}
.toolbar .search-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79,70,229,.08); }
.toolbar .spacer { flex: 1; }

/* Alerts */
.alert-box {
  padding: 14px 18px; border-radius: var(--radius-lg); margin-bottom: 16px;
  font-size: 14px; display: flex; align-items: center; gap: 10px; font-weight: 500;
}
.alert-warning { background: var(--warning-bg); color: #92400e; border: 1px solid #fcd34d; }
.alert-info { background: var(--info-bg); color: #1e40af; border: 1px solid #93c5fd; }
.alert-success { background: var(--success-bg); color: #065f46; border: 1px solid #6ee7b7; }

/* Empty */
.empty-state { text-align: center; padding: 48px; color: var(--text-secondary); }
.empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: .5; }
.empty-state p { font-size: 14px; }

/* Loading */
.loading { text-align: center; padding: 48px; color: var(--text-secondary); }
.spinner {
  display: inline-block; width: 32px; height: 32px;
  border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Shift card */
.shift-card { max-width: 500px; }
.shift-status { padding: 24px; border-radius: var(--radius-lg); margin-bottom: 16px; }
.shift-open { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 2px solid var(--success); }
.shift-closed { background: #f8fafc; border: 2px solid var(--border); }

/* Responsive */
.mobile-header {
  display: none; position: fixed; top: 0; left: 0; right: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff; padding: 14px 16px; z-index: 99;
}
.mobile-header button { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
.sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,.6); backdrop-filter: blur(2px); z-index: 99; }

@media (max-width: 768px) {
  .mobile-header { display: flex; align-items: center; justify-content: space-between; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .main-content { margin-left: 0; padding: 70px 14px 14px; }
  .pos-layout { flex-direction: column; height: auto; }
  .pos-cart { width: 100%; }
  .dash-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .login-card { padding: 32px 24px; }
  .modal { border-radius: var(--radius-lg); }
}

/* Print */
@media print {
  body * { visibility: hidden; }
  #receiptModal, #receiptModal * { visibility: visible; }
  #receiptModal { position: absolute; left: 0; top: 0; width: 100%; }
  .modal-overlay { background: #fff; }
  .modal-footer { display: none; }
  .modal-close { display: none; }
}

/* Shift history table */
.shift-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.shift-summary-item { background: #f8fafc; padding: 14px; border-radius: var(--radius); }
.shift-summary-item .label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.shift-summary-item .value { font-size: 20px; font-weight: 800; }

/* Expense categories */
.expense-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

/* Color picker */
.color-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.color-opt {
  width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
  border: 3px solid transparent; transition: var(--transition);
}
.color-opt:hover, .color-opt.selected { border-color: var(--text); transform: scale(1.1); }

/* Misc */
.text-right { text-align: right; }
.text-center { text-align: center; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.flex { display: flex; }
.gap-2 { gap: 8px; }
.gap-4 { gap: 16px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.hidden { display: none !important; }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-full { width: 100%; }
.overflow-x { overflow-x: auto; }
.clickable-row { cursor: pointer; }
.clickable-row:hover { background: var(--primary-light) !important; }
.low-stock-tag { background: var(--error-bg); color: var(--error); padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* Print Overlay */
#printOverlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #fff; z-index: 100000; overflow-y: auto;
}
.print-toolbar {
  position: sticky; top: 0;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);

}
.print-btn-back {

  transition: var(--transition);
}
.print-btn-back:hover { background: #fff; transform: translateY(-1px); }
.print-btn-cetak {
  padding: 10px 28px; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: linear-gradient(135deg, #059669, #10b981); color: #fff;
  transition: var(--transition); box-shadow: 0 2px 8px rgba(16,185,129,.3);
}
.print-btn-cetak:hover { box-shadow: 0 4px 15px rgba(16,185,129,.4); transform: translateY(-1px); }
.print-receipt-body {
  font-family: "Courier New", monospace; font-size: 12pt;
  width: 72mm; margin: 20px auto; padding: 4mm;
}

body.printing-mode > *:not(#printOverlay) { display: none !important; }

@media print {
  .print-toolbar { display: none !important; }
  #printOverlay { position: static; }
  .print-receipt-body { margin: 0 auto; }
  @page { size: 80mm auto; margin: 0; }
}

<body>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Login Page -->
<div id="loginPage">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:8px">
      <div style="width:64px;height:64px;margin:0 auto 12px;border-radius:18px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 25px rgba(79,70,229,.3)">🏪</div>
    </div>
    <h1>KasirPro</h1>
    <p class="subtitle">Sistem Point of Sale Modern</p>

      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);box-shadow:0 4px 15px rgba(79,70,229,.3)">🔐 Masuk</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;color:#94a3b8">© 2025 KasirPro — All rights reserved</p>
  </div>
</div>

<!-- App Container -->
<div id="appContainer">
  <!-- Mobile Header -->
  <div class="mobile-header">
    <button onclick="toggleSidebar()">☰</button>
    <span style="font-weight:700;font-size:16px">🏪 KasirPro</span>
    <span></span>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(79,70,229,.4)">🏪</div>
          <div><h2>KasirPro</h2><small>Point of Sale</small></div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar"></div>
          <div>
            <div class="user-name" id="userName"></div>
            <span class="role-badge" id="userRoleBadge"></span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">🚪 Keluar</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>
  </div>
</div>

<script>
const API = '';
let currentUser = null;
let token = localStorage.getItem('pos_token');
let currentPage = 'dashboard';

// ============ UTILITIES ============
function escHtml(str) {
  if (str === null || str === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function formatRp(n) {
  if (n === null || n === undefined) n = 0;
  n = Number(n);
  return 'Rp ' + n.toLocaleString('id-ID');
}

function formatDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatDateTime(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + dt.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}

function formatTime(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.innerHTML = '<span>' + (icons[type]||'') + '</span><span>' + escHtml(message) + '</span>';
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut .3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

async function apiFetch(url, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + url, { ...options, headers: { ...headers, ...options.headers } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.error || data.message || 'Terjadi kesalahan';
    throw new Error(msg);
  }
  return data;
}

function loadingHtml() {
  return '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Memuat data...</p></div>';
}

function emptyHtml(icon, text) {
  return '<div class="empty-state"><div class="empty-icon">' + icon + '</div><p>' + escHtml(text) + '</p></div>';
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
}

function openModal(html, cls = '') {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal ' + cls + '">' + html + '</div>';
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function payMethodBadge(m) {
  const map = {
    'Cash': 'badge-green', 'cash': 'badge-green',
    'QRIS': 'badge-purple', 'qris': 'badge-purple',
    'Transfer': 'badge-blue', 'transfer': 'badge-blue',
    'Kartu': 'badge-orange', 'kartu': 'badge-orange'
  };
  const cls = map[m] || 'badge-gray';
  return '<span class="badge ' + cls + '">' + escHtml(m || 'Cash') + '</span>';
}

// ============ AUTH ============
async function checkAuth() {
  if (!token) { showLogin(); return; }
  try {
    const data = await apiFetch('/api/auth/me');
    currentUser = data.user;
    showApp();
  } catch {
    token = null;
    localStorage.removeItem('pos_token');
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appContainer').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  renderSidebar();
  navigateTo(currentUser.role === 'kasir' ? 'pos' : 'dashboard');
}

function logout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('pos_token');
  showLogin();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Memproses...';
  try {
    const data = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('loginUsername').value,
        password: document.getElementById('loginPassword').value
      })
    });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('pos_token', token);
    showToast('Login berhasil! Selamat datang, ' + currentUser.name);
    showApp();
  } catch (err) {
    showToast(err.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Masuk';
});

// ============ NAVIGATION ============
const NAV_ITEMS = [
  { id: 'dashboard', icon: '📊', label: 'Dashboard', roles: ['owner','admin'] },
  { id: 'pos', icon: '🛒', label: 'Kasir', roles: ['owner','admin','kasir'] },
  { id: 'history', icon: '🧾', label: 'Histori Transaksi', roles: ['kasir'] },
  { id: 'products', icon: '📦', label: 'Kelola Produk', roles: ['owner','admin'] },
  { id: 'categories', icon: '🏷️', label: 'Kategori', roles: ['owner','admin'] },
  { id: 'customers', icon: '👥', label: 'Pelanggan', roles: ['owner','admin'] },
  { id: 'expenses', icon: '💸', label: 'Pengeluaran', roles: ['owner','admin'] },
  { id: 'shifts', icon: '⏰', label: 'Shift', roles: ['owner','admin'] },
  { id: 'reports', icon: '📈', label: 'Laporan', roles: ['owner','admin'] },
  { id: 'users', icon: '👤', label: 'Kelola User', roles: ['owner'] },
  { id: 'password', icon: '🔑', label: 'Ganti Password', roles: ['owner','admin','kasir'] },
];

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const role = currentUser.role;
  nav.innerHTML = NAV_ITEMS.filter(n => n.roles.includes(role)).map(n =>
    '<div class="nav-item' + (n.id === currentPage ? ' active' : '') + '" onclick="navigateTo(\'' + n.id + '\')" data-page="' + n.id + '">' +
    '<span class="nav-icon">' + n.icon + '</span><span>' + escHtml(n.label) + '</span></div>'
  ).join('');

  document.getElementById('userAvatar').textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : '?';
  document.getElementById('userName').textContent = currentUser.name || currentUser.username;
  const rb = document.getElementById('userRoleBadge');
  rb.textContent = currentUser.role;
  rb.className = 'role-badge role-' + currentUser.role;
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');

  const main = document.getElementById('mainContent');
  main.innerHTML = loadingHtml();

  const renderers = {
    dashboard: renderDashboard,
    pos: renderPOS,
    history: renderHistory,
    products: renderProducts,
    categories: renderCategories,
    customers: renderCustomers,
    expenses: renderExpenses,
    shifts: renderShifts,
    reports: renderReports,
    users: renderUsers,
    password: renderPassword,
  };
  if (renderers[page]) renderers[page]();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

// ============ HISTORI TRANSAKSI (KASIR) ============
async function renderHistory() {
  const main = document.getElementById('mainContent');
  try {
    const data = await apiFetch('/api/my-transactions');
    const txs = data.transactions || data || [];

    let html = '<div class="page-header"><h1>🧾 Histori Transaksi</h1><p>Riwayat transaksi Anda</p></div>';

    // Summary
    let totalRevenue = 0;
    txs.forEach(tx => { totalRevenue += Number(tx.total) || 0; });
    html += '<div class="stat-grid">';
    html += '<div class="stat-card stat-blue"><div class="stat-icon">🧾</div><div class="stat-value">' + txs.length + '</div><div class="stat-label">Total Transaksi</div></div>';
    html += '<div class="stat-card stat-green"><div class="stat-icon">💰</div><div class="stat-value">' + formatRp(totalRevenue) + '</div><div class="stat-label">Total Penjualan</div></div>';
    html += '</div>';

    if (txs.length > 0) {
      html += '<div class="card mt-4"><div class="card-header"><h3>📋 Daftar Transaksi</h3></div>';
      html += '<div class="overflow-x"><table><thead><tr><th>ID</th><th>Tanggal</th><th>Pelanggan</th><th>Total</th><th>Metode</th></tr></thead><tbody>';
      txs.forEach(tx => {
        html += '<tr class="clickable-row" onclick="showTransactionDetail(' + tx.id + ')">' +
          '<td>#' + tx.id + '</td>' +
          '<td>' + formatDateTime(tx.created_at || tx.date) + '</td>' +
          '<td>' + escHtml(tx.customer_name || 'Umum') + '</td>' +
          '<td><strong>' + formatRp(tx.total) + '</strong></td>' +
          '<td>' + payMethodBadge(tx.payment_method) + '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    } else {
      html += '<div class="card mt-4">' + emptyHtml('🧾', 'Belum ada transaksi') + '</div>';
    }

    main.innerHTML = html;
  } catch (err) {
    main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat histori: ' + escHtml(err.message) + '</div>';
  }
}

// ============ DASHBOARD ============
async function renderDashboard() {
  const main = document.getElementById('mainContent');
  try {
    const data = await apiFetch('/api/dashboard');
    const t = data.today || {};
    const stock = data.stock || {};
    const profit = (Number(t.revenue)||0) - (Number(t.expenses)||0);

    let html = '<div class="page-header"><h1>📊 Dashboard</h1><p>Ringkasan bisnis hari ini</p></div>';

    // Stat cards
    html += '<div class="stat-grid">';
    html += '<div class="stat-card stat-green"><div class="stat-icon">💰</div><div class="stat-value">' + formatRp(t.revenue) + '</div><div class="stat-label">Pendapatan Hari Ini</div></div>';
    html += '<div class="stat-card stat-blue"><div class="stat-icon">🧾</div><div class="stat-value">' + (t.transactions||0) + '</div><div class="stat-label">Transaksi Hari Ini</div></div>';
    html += '<div class="stat-card stat-red"><div class="stat-icon">💸</div><div class="stat-value">' + formatRp(t.expenses) + '</div><div class="stat-label">Pengeluaran Hari Ini</div></div>';
    html += '<div class="stat-card stat-purple"><div class="stat-icon">📈</div><div class="stat-value">' + formatRp(profit) + '</div><div class="stat-label">Laba Bersih Hari Ini</div></div>';
    html += '</div>';

    // Current shift info
    if (data.current_shift) {
      const sh = data.current_shift;
      html += '<div class="alert-box alert-info mb-4">⏰ Shift aktif oleh <strong>' + escHtml(sh.user_name || sh.username || '-') + '</strong> sejak ' + formatTime(sh.opened_at) + ' | Kas awal: ' + formatRp(sh.opening_cash) + '</div>';
    }

    // Sales chart
    const chart = data.sales_chart || [];
    if (chart.length > 0) {
      const maxRev = Math.max(...chart.map(c => Number(c.revenue)||0), 1);
      html += '<div class="card mb-4"><div class="card-header"><h3>📊 Grafik Penjualan 7 Hari Terakhir</h3></div>';
      html += '<div class="bar-chart">';
      chart.forEach(c => {
        const pct = Math.round(((Number(c.revenue)||0) / maxRev) * 100);
        const day = c.date ? new Date(c.date).toLocaleDateString('id-ID',{weekday:'short'}) : '-';
        html += '<div class="bar-col"><div class="bar-value">' + formatRp(c.revenue) + '</div><div class="bar" style="height:' + Math.max(pct,3) + '%"></div><div class="bar-label">' + escHtml(day) + '</div></div>';
      });
      html += '</div></div>';
    }

    // 2-column grid
    html += '<div class="dash-grid">';

    // Recent transactions
    html += '<div class="card"><div class="card-header"><h3>🧾 Transaksi Terakhir</h3></div>';
    const recent = data.recent_transactions || [];
    if (recent.length) {
      html += '<div class="overflow-x"><table><thead><tr><th>Waktu</th><th>Total</th><th>Metode</th></tr></thead><tbody>';
      recent.forEach(tx => {
        html += '<tr><td>' + formatDateTime(tx.created_at || tx.date) + '</td><td><strong>' + formatRp(tx.total) + '</strong></td><td>' + payMethodBadge(tx.payment_method) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += emptyHtml('🧾', 'Belum ada transaksi hari ini');
    }
    html += '</div>';

    // Top products
    html += '<div class="card"><div class="card-header"><h3>🏆 Produk Terlaris Hari Ini</h3></div>';
    const tops = data.top_products_today || data.top_products || [];
    if (tops.length) {
      html += '<div class="overflow-x"><table><thead><tr><th>Produk</th><th class="text-right">Terjual</th></tr></thead><tbody>';
      tops.forEach((p, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        html += '<tr><td>' + medal + ' ' + escHtml(p.name || p.product_name) + '</td><td class="text-right"><strong>' + (p.total_qty || p.qty || 0) + '</strong></td></tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += emptyHtml('🏆', 'Belum ada data');
    }
    html += '</div>';
    html += '</div>'; // end dash-grid

    // Low stock alerts
    const lowStockProducts = (data.low_stock_products || []);
    const outStock = stock.out || 0;
    const lowStock = stock.low || 0;
    if (lowStock > 0 || outStock > 0 || lowStockProducts.length > 0) {
      html += '<div class="card"><div class="card-header"><h3>⚠️ Peringatan Stok</h3></div>';
      html += '<div class="alert-box alert-warning mb-2">Stok habis: <strong>' + outStock + '</strong> produk | Stok menipis: <strong>' + lowStock + '</strong> produk</div>';
      if (lowStockProducts.length > 0) {
        html += '<div class="overflow-x"><table><thead><tr><th>Produk</th><th>Stok</th><th>Min</th></tr></thead><tbody>';
        lowStockProducts.forEach(p => {
          html += '<tr><td>' + escHtml(p.name) + '</td><td><span class="low-stock-tag">' + p.stock + '</span></td><td>' + (p.min_stock||0) + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';
    }

    main.innerHTML = html;
  } catch (err) {
    main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat dashboard: ' + escHtml(err.message) + '</div>';
  }
}

// ============ POS ============
let posProducts = [];
let posCategories = [];
let posCustomers = [];
let cart = [];
let selectedCategory = null;
let selectedPayMethod = 'Cash';
let posSearchTerm = '';

async function renderPOS() {
  const main = document.getElementById('mainContent');
  main.innerHTML = loadingHtml();
  try {
    const [prodData, catData, custData] = await Promise.all([
      apiFetch('/api/products'),
      apiFetch('/api/categories'),
      apiFetch('/api/customers')
    ]);
    posProducts = prodData.products || prodData || [];
    posCategories = catData.categories || catData || [];
    posCustomers = custData.customers || custData || [];
    if (Array.isArray(posProducts) === false) posProducts = [];
    if (Array.isArray(posCategories) === false) posCategories = [];
    if (Array.isArray(posCustomers) === false) posCustomers = [];
    cart = [];
    selectedCategory = null;
    selectedPayMethod = 'Cash';
    posSearchTerm = '';
    renderPOSPage();
  } catch (err) {
    main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat data: ' + escHtml(err.message) + '</div>';
  }
}

function renderPOSPage() {
  const main = document.getElementById('mainContent');
  let html = '<div class="page-header"><h1>🛒 Kasir</h1></div>';
  html += '<div class="pos-layout">';

  // Left: Products
  html += '<div class="pos-products">';
  html += '<div class="pos-search"><input type="text" id="posSearch" placeholder="🔍 Cari produk atau scan barcode..." value="' + escHtml(posSearchTerm) + '" onkeyup="handlePosSearch(event)" autofocus><button class="btn btn-primary" onclick="scanBarcode()">📷</button></div>';

  // Category pills
  html += '<div class="category-pills">';
  html += '<div class="category-pill' + (selectedCategory === null ? ' active' : '') + '" onclick="filterCategory(null)">Semua</div>';
  posCategories.forEach(c => {
    html += '<div class="category-pill' + (selectedCategory === c.id ? ' active' : '') + '" onclick="filterCategory(' + c.id + ')" style="' + (selectedCategory === c.id ? 'background:' + (c.color||'var(--primary)') + ';color:#fff;border-color:' + (c.color||'var(--primary)') : '') + '">' + escHtml(c.name) + '</div>';
  });
  html += '</div>';

  // Product grid
  html += '<div class="product-grid" id="posProductGrid">';
  html += renderProductGrid();
  html += '</div></div>';

  // Right: Cart
  html += renderCartPanel();
  html += '</div>';

  main.innerHTML = html;
}

function renderProductGrid() {
  let filtered = posProducts;
  if (selectedCategory !== null) {
    filtered = filtered.filter(p => p.category_id === selectedCategory);
  }
  if (posSearchTerm) {
    const s = posSearchTerm.toLowerCase();
    filtered = filtered.filter(p => (p.name && p.name.toLowerCase().includes(s)) || (p.barcode && p.barcode.toLowerCase().includes(s)));
  }
  if (filtered.length === 0) {
    return emptyHtml('📦', 'Tidak ada produk ditemukan');
  }
  return filtered.map(p => {
    const oos = (p.stock !== undefined && p.stock !== null && p.stock <= 0);
    const catColor = p.category_color || '#6b7280';
    return '<div class="product-card' + (oos ? ' out-of-stock' : '') + '" onclick="addToCart(' + p.id + ')">' +
      '<div class="p-name">' + escHtml(p.name) + '</div>' +
      '<div class="p-price">' + formatRp(p.price) + '</div>' +
      '<div class="p-meta">' +
        '<span class="p-stock">' + (oos ? '❌ Habis' : '📦 ' + p.stock) + '</span>' +
        (p.category_name ? '<span class="category-badge" style="background:' + escHtml(catColor) + '">' + escHtml(p.category_name) + '</span>' : '') +
      '</div></div>';
  }).join('');
}

function handlePosSearch(e) {
  posSearchTerm = e.target.value;
  if (e.key === 'Enter' && posSearchTerm) {
    // Try barcode lookup
    const found = posProducts.find(p => p.barcode && p.barcode === posSearchTerm);
    if (found) {
      addToCart(found.id);
      e.target.value = '';
      posSearchTerm = '';
    }
  }
  document.getElementById('posProductGrid').innerHTML = renderProductGrid();
}

async function scanBarcode() {
  const code = prompt('Scan atau masukkan barcode:');
  if (!code) return;
  try {
    const data = await apiFetch('/api/products/barcode/' + encodeURIComponent(code));
    const p = data.product || data;
    if (p && p.id) {
      // Add to posProducts if not there
      if (!posProducts.find(x => x.id === p.id)) posProducts.push(p);
      addToCart(p.id);
    } else {
      showToast('Produk tidak ditemukan', 'warning');
    }
  } catch {
    showToast('Produk dengan barcode tersebut tidak ditemukan', 'warning');
  }
}

function filterCategory(catId) {
  selectedCategory = catId;
  renderPOSPage();
}

function addToCart(productId) {
  const p = posProducts.find(x => x.id === productId);
  if (!p) return;
  if (p.stock !== undefined && p.stock !== null && p.stock <= 0) {
    showToast('Stok produk habis', 'warning');
    return;
  }
  const existing = cart.find(c => c.id === productId);
  if (existing) {
    if (p.stock !== undefined && p.stock !== null && existing.qty >= p.stock) {
      showToast('Stok tidak mencukupi', 'warning');
      return;
    }
    existing.qty++;
  } else {
    cart.push({ id: p.id, name: p.name, price: Number(p.price), qty: 1, discount: 0 });
  }
  updateCartUI();
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartUI();
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) { cart.splice(idx, 1); }
  else {
    const p = posProducts.find(x => x.id === cart[idx].id);
    if (p && p.stock !== undefined && p.stock !== null && cart[idx].qty > p.stock) {
      cart[idx].qty = p.stock;
      showToast('Stok tidak mencukupi', 'warning');
    }
  }
  updateCartUI();
}

function updateItemDiscount(idx, val) {
  cart[idx].discount = Number(val) || 0;
  updateCartUI();
}

function updateCartUI() {
  const cartEl = document.getElementById('cartPanel');
  if (cartEl) cartEl.outerHTML = renderCartPanel();
}

function renderCartPanel() {
  const subtotal = cart.reduce((s, c) => s + (c.price * c.qty - c.discount), 0);
  const discountEl = document.getElementById('cartDiscount');
  const totalDiscount = discountEl ? (Number(discountEl.value)||0) : 0;
  const grandTotal = Math.max(subtotal - totalDiscount, 0);

  let html = '<div class="pos-cart" id="cartPanel">';
  html += '<div class="cart-header"><h3>🛒 Keranjang (' + cart.length + ' item)</h3></div>';

  // Customer selector
  html += '<div class="cart-customer"><select id="cartCustomer"><option value="">Umum (Tanpa Pelanggan)</option>';
  posCustomers.forEach(c => {
    html += '<option value="' + c.id + '">' + escHtml(c.name) + (c.phone ? ' - ' + escHtml(c.phone) : '') + '</option>';
  });
  html += '</select></div>';

  // Cart items
  html += '<div class="cart-items">';
  if (cart.length === 0) {
    html += '<div class="cart-empty"><div class="empty-icon">🛒</div><p>Keranjang kosong</p><p style="font-size:12px;margin-top:4px">Klik produk untuk menambahkan</p></div>';
  } else {
    cart.forEach((c, i) => {
      const itemTotal = c.price * c.qty - c.discount;
      html += '<div class="cart-item">' +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">' + escHtml(c.name) + '</div>' +
          '<div class="cart-item-price">' + formatRp(c.price) + ' x ' + c.qty + '</div>' +
          '<div class="cart-item-disc">Disc: <input type="number" min="0" value="' + c.discount + '" onchange="updateItemDiscount(' + i + ',this.value)" placeholder="0"></div>' +
        '</div>' +
        '<div class="qty-control">' +
          '<button onclick="changeQty(' + i + ',-1)">−</button>' +
          '<span>' + c.qty + '</span>' +
          '<button onclick="changeQty(' + i + ',1)">+</button>' +
        '</div>' +
        '<div class="cart-item-total">' + formatRp(itemTotal) + '</div>' +
        '<button class="remove-btn" onclick="removeFromCart(' + i + ')">✕</button>' +
      '</div>';
    });
  }
  html += '</div>';

  // Summary
  html += '<div class="cart-summary">';
  html += '<div class="summary-row"><span>Subtotal</span><span>' + formatRp(subtotal) + '</span></div>';
  html += '<div class="discount-input"><label>Diskon:</label><input type="number" id="cartDiscount" min="0" value="' + totalDiscount + '" onchange="updateCartUI()" placeholder="0"></div>';
  html += '<div class="summary-row total"><span>TOTAL</span><span>' + formatRp(grandTotal) + '</span></div>';

  // Payment methods
  html += '<div class="payment-methods">';
  ['Cash','QRIS','Transfer','Kartu'].forEach(m => {
    html += '<div class="pay-method-btn' + (selectedPayMethod === m ? ' active' : '') + '" onclick="selectPayMethod(\'' + m + '\')">' + m + '</div>';
  });
  html += '</div>';

  // Payment input
  if (selectedPayMethod === 'Cash') {
    html += '<div class="payment-input"><input type="number" id="paymentAmount" placeholder="Jumlah bayar..." oninput="calcChange()" min="0"></div>';
    html += '<div class="change-display">Kembalian: <span id="changeAmount">Rp 0</span></div>';
  }

  // Notes
  html += '<div class="cart-notes"><textarea id="cartNotes" placeholder="Catatan (opsional)..."></textarea></div>';

  html += '<button class="btn-pay" onclick="processPayment()"' + (cart.length === 0 ? ' disabled' : '') + '>💳 Bayar ' + formatRp(grandTotal) + '</button>';
  html += '</div></div>';

  return html;
}

function selectPayMethod(m) {
  selectedPayMethod = m;
  updateCartUI();
}

function calcChange() {
  const subtotal = cart.reduce((s, c) => s + (c.price * c.qty - c.discount), 0);
  const discountEl = document.getElementById('cartDiscount');
  const totalDiscount = discountEl ? (Number(discountEl.value)||0) : 0;
  const grandTotal = Math.max(subtotal - totalDiscount, 0);
  const paid = Number(document.getElementById('paymentAmount')?.value) || 0;
  const change = paid - grandTotal;
  const el = document.getElementById('changeAmount');
  if (el) {
    el.textContent = formatRp(Math.max(change, 0));
    el.style.color = change >= 0 ? 'var(--success)' : 'var(--error)';
  }
}

async function processPayment() {
  if (cart.length === 0) return;
  const subtotal = cart.reduce((s, c) => s + (c.price * c.qty - c.discount), 0);
  const discountEl = document.getElementById('cartDiscount');
  const totalDiscount = discountEl ? (Number(discountEl.value)||0) : 0;
  const grandTotal = Math.max(subtotal - totalDiscount, 0);

  let payment = grandTotal;
  if (selectedPayMethod === 'Cash') {
    const payEl = document.getElementById('paymentAmount');
    payment = payEl ? Number(payEl.value) || 0 : 0;
    if (payment < grandTotal) {
      showToast('Pembayaran kurang!', 'error');
      return;
    }
  }

  const change = payment - grandTotal;
  const custEl = document.getElementById('cartCustomer');
  const custId = custEl ? custEl.value : '';
  const custOpt = custEl ? custEl.options[custEl.selectedIndex] : null;
  const custName = custOpt && custId ? custOpt.textContent.split(' - ')[0].trim() : 'Umum';
  const notesEl = document.getElementById('cartNotes');
  const notes = notesEl ? notesEl.value : '';

  const payload = {
    items: cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty, discount: c.discount })),
    subtotal: subtotal,
    discount: totalDiscount,
    total: grandTotal,
    payment: payment,
    change: change,
    payment_method: selectedPayMethod,
    customer_id: custId ? Number(custId) : null,
    customer_name: custName,
    notes: notes
  };

  try {
    const result = await apiFetch('/api/transactions', { method: 'POST', body: JSON.stringify(payload) });
    showToast('Transaksi berhasil!', 'success');
    showReceipt(payload, result);
    cart = [];
    // Refresh products stock
    try {
      const prodData = await apiFetch('/api/products');
      posProducts = prodData.products || prodData || [];
    } catch {}
    updateCartUI();
    document.getElementById('posProductGrid').innerHTML = renderProductGrid();
  } catch (err) {
    showToast('Gagal memproses: ' + err.message, 'error');
  }
}

function showReceipt(payload, result) {
  const tx = result.transaction || result;
  const txId = tx.id || '-';
  const now = new Date();
  let html = '<div class="modal-header"><h3>🧾 Struk Pembayaran</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';
  html += '<div class="modal-body"><div class="receipt" id="receiptContent">';
  html += '<div class="receipt-header"><h3>KasirPro</h3><p style="font-size:11px">Struk Pembayaran</p></div>';
  html += '<div class="receipt-divider"></div>';
  html += '<div class="receipt-row"><span>No: #' + escHtml(String(txId)) + '</span><span>' + formatDateTime(now) + '</span></div>';
  html += '<div class="receipt-row"><span>Kasir: ' + escHtml(currentUser.name) + '</span></div>';
  html += '<div class="receipt-row"><span>Pelanggan: ' + escHtml(payload.customer_name) + '</span></div>';
  html += '<div class="receipt-divider"></div>';

  payload.items.forEach(item => {
    html += '<div class="receipt-item"><div class="item-name">' + escHtml(item.name) + '</div>';
    html += '<div class="item-detail"><span>' + item.qty + ' x ' + formatRp(item.price) + (item.discount > 0 ? ' disc ' + formatRp(item.discount) : '') + '</span><span>' + formatRp(item.price * item.qty - item.discount) + '</span></div></div>';
  });

  html += '<div class="receipt-divider"></div>';
  html += '<div class="receipt-row"><span>Subtotal</span><span>' + formatRp(payload.subtotal) + '</span></div>';
  if (payload.discount > 0) {
    html += '<div class="receipt-row"><span>Diskon</span><span>-' + formatRp(payload.discount) + '</span></div>';
  }
  html += '<div class="receipt-divider"></div>';
  html += '<div class="receipt-row receipt-total"><span>TOTAL</span><span>' + formatRp(payload.total) + '</span></div>';
  html += '<div class="receipt-row"><span>Bayar (' + escHtml(payload.payment_method) + ')</span><span>' + formatRp(payload.payment) + '</span></div>';
  if (payload.change > 0) {
    html += '<div class="receipt-row"><span>Kembalian</span><span>' + formatRp(payload.change) + '</span></div>';
  }
  html += '<div class="receipt-divider"></div>';
  html += '<div class="receipt-footer">Terima kasih telah berbelanja!<br>Powered by KasirPro</div>';
  html += '</div></div>';
  html += '<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Tutup</button><button class="btn btn-primary" onclick="printReceipt()">🖨️ Cetak</button></div>';

  openModal(html);
  document.querySelector('.modal-overlay').id = 'receiptModal';
}

function printReceipt() {
  const content = document.getElementById('receiptContent');
  if (!content) return;
  
  // Remove existing overlay if any
  closePrintOverlay();
  
  // Create fullscreen overlay (no new tab/iframe - works on Android)
  const overlay = document.createElement('div');
  overlay.id = 'printOverlay';
  overlay.innerHTML = 
    '<div class="print-toolbar">' +
      '<button class="print-btn-back" onclick="closePrintOverlay()">← Kembali</button>' +
      '<button class="print-btn-cetak" onclick="doPrint()">🖨️ Cetak</button>' +
    '</div>' +
    '<div class="print-receipt-body">' + content.innerHTML + '</div>';
  document.body.appendChild(overlay);
  document.body.classList.add('printing-mode');
}

function doPrint() {
  window.print();
}

function closePrintOverlay() {
  const overlay = document.getElementById('printOverlay');
  if (overlay) overlay.remove();
  document.body.classList.remove('printing-mode');
}

// ============ PRODUCTS ============
async function renderProducts() {
  const main = document.getElementById('mainContent');
  try {
    const [prodData, catData] = await Promise.all([
      apiFetch('/api/products'),
      apiFetch('/api/categories')
    ]);
    const products = prodData.products || prodData || [];
    const categories = catData.categories || catData || [];

    let html = '<div class="page-header"><h1>📦 Kelola Produk</h1><p>Manajemen produk dan stok</p></div>';
    html += '<div class="toolbar"><input class="search-input" placeholder="🔍 Cari produk..." oninput="filterProductTable(this.value)"><div class="spacer"></div><button class="btn btn-primary" onclick="showProductModal()">+ Tambah Produk</button></div>';

    html += '<div class="card"><div class="overflow-x"><table id="productTable"><thead><tr><th>Barcode</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Min</th><th>Aksi</th></tr></thead><tbody>';
    if (products.length === 0) {
      html += '<tr><td colspan="7">' + emptyHtml('📦', 'Belum ada produk') + '</td></tr>';
    } else {
      products.forEach(p => {
        const catColor = p.category_color || '#6b7280';
        const low = (p.min_stock && p.stock <= p.min_stock);
        html += '<tr data-search="' + escHtml((p.name||'').toLowerCase() + ' ' + (p.barcode||'').toLowerCase()) + '">' +
          '<td><code>' + escHtml(p.barcode || '-') + '</code></td>' +
          '<td><strong>' + escHtml(p.name) + '</strong></td>' +
          '<td>' + (p.category_name ? '<span class="category-badge" style="background:' + escHtml(catColor) + '">' + escHtml(p.category_name) + '</span>' : '-') + '</td>' +
          '<td>' + formatRp(p.price) + '</td>' +
          '<td>' + (low ? '<span class="low-stock-tag">' + p.stock + '</span>' : p.stock) + '</td>' +
          '<td>' + (p.min_stock||0) + '</td>' +
          '<td><button class="btn btn-sm btn-primary" onclick=\'showProductModal(' + JSON.stringify(p).replace(/'/g, "\\'") + ')\'>✏️</button> ' +
          '<button class="btn btn-sm btn-danger" onclick="deleteProduct(' + p.id + ')">🗑️</button></td></tr>';
      });
    }
    html += '</tbody></table></div></div>';

    main.innerHTML = html;
    // Store categories for modal
    window._productCategories = categories;
  } catch (err) {
    main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat produk: ' + escHtml(err.message) + '</div>';
  }
}

function filterProductTable(val) {
  const rows = document.querySelectorAll('#productTable tbody tr');
  const s = val.toLowerCase();
  rows.forEach(r => {
    const d = r.dataset.search || '';
    r.style.display = d.includes(s) ? '' : 'none';
  });
}

function showProductModal(product) {
  const isEdit = !!product;
  const cats = window._productCategories || [];
  let html = '<div class="modal-header"><h3>' + (isEdit ? '✏️ Edit Produk' : '➕ Tambah Produk') + '</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';
  html += '<div class="modal-body"><form id="productForm">';
  html += '<div class="form-group"><label>Barcode</label><input id="pBarcode" value="' + escHtml(product?.barcode || '') + '" placeholder="Barcode (opsional)"></div>';
  html += '<div class="form-group"><label>Nama Produk *</label><input id="pName" value="' + escHtml(product?.name || '') + '" required></div>';
  html += '<div class="form-group"><label>Harga *</label><input id="pPrice" type="number" min="0" value="' + (product?.price || '') + '" required></div>';
  html += '<div class="form-group"><label>Stok *</label><input id="pStock" type="number" min="0" value="' + (product?.stock ?? '') + '" required></div>';
  html += '<div class="form-group"><label>Stok Minimum</label><input id="pMinStock" type="number" min="0" value="' + (product?.min_stock || 0) + '"></div>';
  html += '<div class="form-group"><label>Kategori</label><select id="pCategory"><option value="">-- Pilih Kategori --</option>';
  cats.forEach(c => {
    html += '<option value="' + c.id + '"' + (product?.category_id === c.id ? ' selected' : '') + '>' + escHtml(c.name) + '</option>';
  });
  html += '</select></div>';
  html += '</form></div>';
  html += '<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveProduct(' + (isEdit ? product.id : 'null') + ')">Simpan</button></div>';
  openModal(html);
}

async function saveProduct(id) {
  const payload = {

let expenseFilter = '';

async function renderExpenses() {
  const main = document.getElementById('mainContent');
  try {
    const today = new Date().toISOString().split('T')[0];
    const [expData, summaryData] = await Promise.all([
      apiFetch('/api/expenses?month=' + today.substring(0,7)),
      apiFetch('/api/expenses/summary?period=month').catch(() => ({ total: 0 }))
    ]);
    const expenses = expData.expenses || expData || [];
    const summary = summaryData;

    let html = '<div class="page-header"><h1>💸 Pengeluaran</h1><p>Catat dan kelola pengeluaran</p></div>';

    // Summary cards
    const todaySum = await apiFetch('/api/expenses/summary?period=today').catch(() => ({ total: 0 }));
    const weekSum = await apiFetch('/api/expenses/summary?period=week').catch(() => ({ total: 0 }));
    html += '<div class="stat-grid">';
    html += '<div class="stat-card stat-red"><div class="stat-icon">📅</div><div class="stat-value">' + formatRp(todaySum.total || todaySum.summary?.total) + '</div><div class="stat-label">Hari Ini</div></div>';
    html += '<div class="stat-card stat-blue"><div class="stat-icon">📆</div><div class="stat-value">' + formatRp(weekSum.total || weekSum.summary?.total) + '</div><div class="stat-label">Minggu Ini</div></div>';

    html += '</div>';

    // Toolbar
    html += '<div class="toolbar">';
    const expCats = ['Semua','Operasional','Belanja','Gaji','Listrik/Air','Lainnya'];
    html += '<div class="expense-cats">';
    expCats.forEach(cat => {
      const active = (cat === 'Semua' && !expenseFilter) || (expenseFilter === cat);
      html += '<div class="category-pill' + (active ? ' active' : '') + '" onclick="filterExpenses(\'' + (cat === 'Semua' ? '' : cat) + '\')">' + escHtml(cat) + '</div>';
    });
    html += '</div><div class="spacer"></div><button class="btn btn-primary" onclick="showExpenseModal()">+ Tambah Pengeluaran</button></div>';

    // Table
    html += '<div class="card"><div class="overflow-x"><table id="expenseTable"><thead><tr><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th>Jumlah</th><th>Aksi</th></tr></thead><tbody>';
    const filtered = expenseFilter ? expenses.filter(e => e.category === expenseFilter) : expenses;
    if (filtered.length === 0) {
      html += '<tr><td colspan="5">' + emptyHtml('💸', 'Belum ada pengeluaran') + '</td></tr>';
    } else {
      filtered.forEach(e => {
        html += '<tr><td>' + formatDate(e.date || e.created_at) + '</td><td><span class="badge badge-gray">' + escHtml(e.category) + '</span></td>' +
          '<td>' + escHtml(e.description || '-') + '</td>' +
          '<td class="text-right"><strong style="color:var(--error)">' + formatRp(e.amount) + '</strong></td>' +
          '<td><button class="btn btn-sm btn-danger" onclick="deleteExpense(' + e.id + ')">🗑️</button></td></tr>';
      });
    }
    html += '</tbody></table></div></div>';
    main.innerHTML = html;
  } catch (err) { main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat: ' + escHtml(err.message) + '</div>'; }
}

    html += '</div>'; // end dash-grid

    // Top products
    html += '<div class="card mt-4"><div class="card-header"><h3>🏆 Produk Terlaris</h3></div>';
    if (topProducts.length > 0) {
      html += '<div class="overflow-x"><table><thead><tr><th>#</th><th>Produk</th><th>Terjual</th><th>Revenue</th></tr></thead><tbody>';
      topProducts.forEach((p, i) => {
        html += '<tr><td>' + (i+1) + '</td><td><strong>' + escHtml(p.name || p.product_name) + '</strong></td><td>' + (p.total_qty || p.qty || 0) + '</td><td>' + formatRp(p.total_revenue || p.revenue) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else { html += emptyHtml('🏆', 'Tidak ada data'); }
    html += '</div>';

    // Transaction list
    const txData = await apiFetch('/api/transactions?start_date=&end_date=').catch(() => ({ transactions: [] }));
    const txs = txData.transactions || txData || [];
    if (Array.isArray(txs) && txs.length > 0) {
      html += '<div class="card mt-4"><div class="card-header"><h3>🧾 Daftar Transaksi</h3></div>';
      html += '<div class="overflow-x"><table><thead><tr><th>ID</th><th>Tanggal</th><th>Pelanggan</th><th>Total</th><th>Metode</th><th>Kasir</th></tr></thead><tbody>';
      txs.slice(0, 50).forEach(tx => {
        html += '<tr class="clickable-row" onclick="showTransactionDetail(' + tx.id + ')">' +
          '<td>#' + tx.id + '</td>' +
          '<td>' + formatDateTime(tx.created_at || tx.date) + '</td>' +
          '<td>' + escHtml(tx.customer_name || 'Umum') + '</td>' +
          '<td><strong>' + formatRp(tx.total) + '</strong></td>' +
          '<td>' + payMethodBadge(tx.payment_method) + '</td>' +
          '<td>' + escHtml(tx.cashier_name || tx.user_name || '-') + '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }

    main.innerHTML = html;
  } catch (err) { main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat: ' + escHtml(err.message) + '</div>'; }
}

function changeReportPeriod(p) {
  reportPeriod = p;
  renderReports();
}

async function showTransactionDetail(id) {
  try {
    const data = await apiFetch('/api/transactions/' + id);
    const tx = data.transaction || data;
    const items = data.items || tx.items || [];
    let html = '<div class="modal-header"><h3>🧾 Detail Transaksi #' + escHtml(String(tx.id)) + '</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';
    html += '<div class="modal-body"><div class="receipt">';
    html += '<div class="receipt-header"><h3>KasirPro</h3></div>';
    html += '<div class="receipt-divider"></div>';
    html += '<div class="receipt-row"><span>Tanggal</span><span>' + formatDateTime(tx.created_at || tx.date) + '</span></div>';
    html += '<div class="receipt-row"><span>Kasir</span><span>' + escHtml(tx.cashier_name || tx.user_name || '-') + '</span></div>';
    html += '<div class="receipt-row"><span>Pelanggan</span><span>' + escHtml(tx.customer_name || 'Umum') + '</span></div>';
    html += '<div class="receipt-divider"></div>';
    items.forEach(item => {
      html += '<div class="receipt-item"><div class="item-name">' + escHtml(item.name || item.product_name) + '</div>';
      html += '<div class="item-detail"><span>' + item.qty + ' x ' + formatRp(item.price) + (Number(item.discount) > 0 ? ' disc ' + formatRp(item.discount) : '') + '</span><span>' + formatRp((item.price * item.qty) - (Number(item.discount)||0)) + '</span></div></div>';
    });
    html += '<div class="receipt-divider"></div>';
    html += '<div class="receipt-row"><span>Subtotal</span><span>' + formatRp(tx.subtotal) + '</span></div>';
    if (Number(tx.discount) > 0) html += '<div class="receipt-row"><span>Diskon</span><span>-' + formatRp(tx.discount) + '</span></div>';
    html += '<div class="receipt-row receipt-total"><span>TOTAL</span><span>' + formatRp(tx.total) + '</span></div>';
    html += '<div class="receipt-row"><span>Bayar (' + escHtml(tx.payment_method) + ')</span><span>' + formatRp(tx.payment) + '</span></div>';
    if (Number(tx.change) > 0) html += '<div class="receipt-row"><span>Kembalian</span><span>' + formatRp(tx.change) + '</span></div>';
    if (tx.notes) { html += '<div class="receipt-divider"></div><p style="font-size:12px">Catatan: ' + escHtml(tx.notes) + '</p>'; }
    html += '</div></div>';
    html += '<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Tutup</button></div>';
    openModal(html);
  } catch (err) { showToast(err.message, 'error'); }
}

// ============ USERS ============
async function renderUsers() {
  const main = document.getElementById('mainContent');
  try {
    const data = await apiFetch('/api/users');
    const users = data.users || data || [];
    let html = '<div class="page-header"><h1>👤 Kelola User</h1><p>Manajemen pengguna sistem</p></div>';
    html += '<div class="toolbar"><div class="spacer"></div><button class="btn btn-primary" onclick="showUserModal()">+ Tambah User</button></div>';

    html += '<div class="card"><div class="overflow-x"><table><thead><tr><th>Username</th><th>Nama</th><th>Role</th><th>Aksi</th></tr></thead><tbody>';
    if (users.length === 0) {
      html += '<tr><td colspan="4">' + emptyHtml('👤', 'Belum ada user') + '</td></tr>';
    } else {
      users.forEach(u => {
        html += '<tr><td><code>' + escHtml(u.username) + '</code></td>' +
          '<td><strong>' + escHtml(u.name) + '</strong></td>' +
          '<td><span class="role-badge role-' + escHtml(u.role) + '">' + escHtml(u.role) + '</span></td>' +
          '<td><button class="btn btn-sm btn-primary" onclick=\'showUserModal(' + JSON.stringify(u).replace(/'/g, "\\'") + ')\'>✏️</button> ' +
          (u.id !== currentUser.id ? '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + u.id + ')">🗑️</button>' : '') + '</td></tr>';
      });
    }
    html += '</tbody></table></div></div>';
    main.innerHTML = html;
  } catch (err) { main.innerHTML = '<div class="alert-box alert-warning">Gagal memuat: ' + escHtml(err.message) + '</div>'; }
}

function showUserModal(user) {
  const isEdit = !!user;
  let html = '<div class="modal-header"><h3>' + (isEdit ? '✏️ Edit User' : '➕ Tambah User') + '</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';
  html += '<div class="modal-body"><form id="userForm">';
  html += '<div class="form-group"><label>Username *</label><input id="uUsername" value="' + escHtml(user?.username || '') + '"' + (isEdit ? ' readonly style="background:#f3f4f6"' : ' required') + '></div>';
  html += '<div class="form-group"><label>Nama *</label><input id="uName" value="' + escHtml(user?.name || '') + '" required></div>';
  if (!isEdit) {
    html += '<div class="form-group"><label>Password *</label><input id="uPassword" type="password" required></div>';
  }
  html += '<div class="form-group"><label>Role *</label><select id="uRole"><option value="kasir"' + (user?.role === 'kasir' ? ' selected' : '') + '>Kasir</option><option value="admin"' + (user?.role === 'admin' ? ' selected' : '') + '>Admin</option><option value="owner"' + (user?.role === 'owner' ? ' selected' : '') + '>Owner</option></select></div>';
  html += '</form></div>';
  html += '<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveUser(' + (isEdit ? user.id : 'null') + ')">Simpan</button></div>';
  openModal(html);
}

async function saveUser(id) {
  const payload = {
    username: document.getElementById('uUsername').value,
    name: document.getElementById('uName').value,
    role: document.getElementById('uRole').value
  };
  if (!id) {
    payload.password = document.getElementById('uPassword').value;
    if (!payload.password) { showToast('Password wajib diisi', 'error'); return; }
  }
  if (!payload.name || !payload.username) { showToast('Username dan nama wajib diisi', 'error'); return; }
  try {
    if (id) {
      await apiFetch('/api/users/' + id, { method: 'PUT', body: JSON.stringify(payload) });
      showToast('User diperbarui');
    } else {
      await apiFetch('/api/users', { method: 'POST', body: JSON.stringify(payload) });
      showToast('User ditambahkan');
    }
    closeModal(); renderUsers();
  } catch (err) { showToast(err.message, 'error'); }
}

async function deleteUser(id) {
  if (!confirm('Hapus user ini?')) return;
  try {
    await apiFetch('/api/users/' + id, { method: 'DELETE' });
    showToast('User dihapus'); renderUsers();
  } catch (err) { showToast(err.message, 'error'); }
}

// ============ CHANGE PASSWORD ============
function renderPassword() {
  const main = document.getElementById('mainContent');
  let html = '<div class="page-header"><h1>🔑 Ganti Password</h1><p>Ubah password akun Anda</p></div>';
  html += '<div class="card" style="max-width:500px"><form id="passwordForm">';
  html += '<div class="form-group"><label>Password Lama</label><input id="oldPassword" type="password" required></div>';
  html += '<div class="form-group"><label>Password Baru</label><input id="newPassword" type="password" required></div>';
  html += '<div class="form-group"><label>Konfirmasi Password Baru</label><input id="confirmPassword" type="password" required></div>';
  html += '<button type="button" class="btn btn-primary" onclick="changePassword()">Simpan Password</button>';
  html += '</form></div>';
  main.innerHTML = html;
}

async function changePassword() {
  const oldPw = document.getElementById('oldPassword').value;
  const newPw = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;
  if (!oldPw || !newPw) { showToast('Semua field wajib diisi', 'error'); return; }
  if (newPw !== confirmPw) { showToast('Konfirmasi password tidak cocok', 'error'); return; }
  if (newPw.length < 4) { showToast('Password minimal 4 karakter', 'error'); return; }
  try {
    await apiFetch('/api/auth/change-password', { method: 'POST', body: JSON.stringify({ old_password: oldPw, new_password: newPw }) });
    showToast('Password berhasil diubah!');
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
  } catch (err) { showToast(err.message, 'error'); }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'F2' && currentPage === 'pos') {
    e.preventDefault();
    const el = document.getElementById('posSearch');
    if (el) el.focus();
  }
});
